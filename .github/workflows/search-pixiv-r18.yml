name: Search Pixiv R18

on:
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pixivpy3 -q

      - name: Search R18 Eyjafjalla
        run: python search_r18_action.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eyja-r18-results
          path: eyja_r18_results.json
